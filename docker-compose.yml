# Local dev stack for the carrier sales PoC.
# `docker compose up --build` brings up Postgres, the FastAPI api, and the
# Streamlit dashboard. The api entrypoint runs alembic migrations and seeds
# loads from /app/data/loads.json (mounted read-only from ./data).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: carrier
      POSTGRES_PASSWORD: carrier
      POSTGRES_DB: carrier_sales
    # No host port mapping — the api reaches db via the compose network.
    # Expose a host port here if you need psql access from the host.
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carrier -d carrier_sales"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://carrier:carrier@db:5432/carrier_sales
      LOADS_JSON_PATH: /app/data/loads.json
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  db_data:
